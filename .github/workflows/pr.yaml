name: PR CI

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  NODE_VERSION: "16.x"

jobs:
  build:
    name: Lint, build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install packages
        run: |
          npm install

      - name: Run linter
        run: |
          npx lerna run lint

      - name: Check formatting
        run: |
          npx lerna run format:check

      - name: Build code
        run: |
          npx lerna run build

      - name: Run tests
        run: |
          npx lerna run test
